# ─────────────────────────────────────────────────────────────
# PotatoShield — Nginx Production Config
# Domain: potatoshield.com
# ─────────────────────────────────────────────────────────────

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name potatoshield.com www.potatoshield.com;

    # Let's Encrypt ACME challenge (needed for cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name potatoshield.com www.potatoshield.com;

    # ── SSL Certificate (issued by Let's Encrypt via Certbot)
    ssl_certificate     /etc/letsencrypt/live/potatoshield.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/potatoshield.com/privkey.pem;

    # ── Modern SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # ── OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security headers
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     "nosniff"                                       always;
    add_header X-Frame-Options            "SAMEORIGIN"                                    always;
    add_header X-XSS-Protection           "1; mode=block"                                 always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://potatoshield.com https://accounts.google.com; frame-src https://accounts.google.com;" always;

    # ── File upload size (allow up to 20 MB for leaf images)
    client_max_body_size 20M;

    # ── Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ── Frontend (React static build, served directly from Nginx)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Backend API proxy (all /api/* requests → FastAPI on port 8000)
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;         # strip the /api prefix
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Google OAuth callback proxy
    location /auth/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
    }
}
