services:
  # ── FastAPI Backend ───────────────────────────────────────────
  - type: web
    name: potatoshield-api
    runtime: python
    region: singapore    # closest to India
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure secret
      - key: GOOGLE_CLIENT_ID
        value: YOUR_GOOGLE_CLIENT_ID_HERE
      - key: GOOGLE_CLIENT_SECRET
        value: YOUR_GOOGLE_CLIENT_SECRET_HERE
      - key: FRONTEND_URL
        value: https://potatoshield.vercel.app
      - key: BACKEND_URL
        value: https://potatoshield-api.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://potatoshield.vercel.app
